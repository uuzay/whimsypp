{{- $src := .Get "src" -}}
{{- $width := .Get "width" | default "100%" -}}
{{- $height := .Get "height" | default "400px" -}}
<div class="godbolt-embed">
    <div class="godbolt-header">
        <svg class="godbolt-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="4 17 10 11 4 5"/>
            <line x1="12" y1="19" x2="20" y2="19"/>
        </svg>
        <span class="godbolt-label">Interactive · Compiler Explorer</span>
    </div>
    <iframe
        class="godbolt-iframe"
        width="{{ $width }}"
        height="{{ $height }}"
        src="{{ $src }}"
        frameborder="0"
        allowfullscreen
        loading="lazy">
    </iframe>
</div>
