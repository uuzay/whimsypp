{{- $num := .Get 0 | default "" -}}
<aside class="clavis-card">
    <div class="clavis-header">
        <svg class="clavis-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="7.5" cy="15.5" r="5.5"/>
            <path d="M21 2l-9.6 9.6"/>
            <path d="M15.5 7.5l3 3L22 7l-3-3"/>
        </svg>
        <span class="clavis-label">Clavis{{ if $num }}&nbsp;{{ $num }}{{ end }}</span>
    </div>
    <div class="clavis-body">{{ .Inner | markdownify }}</div>
</aside>
