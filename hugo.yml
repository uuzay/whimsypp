baseURL: "/"
languageCode: "en-us"
title: "Whimsy++"
theme: "PaperMod"

pagination:
  pagerSize: 5

enableEmoji: true
enableInlineShortcodes: true

markup:
  highlight:
    noClasses: false
    style: "dracula"
    guessSyntax: true
    lineNos: true
    lineNumbersInTable: true

params:
  env: production
  title: "Whimsy++"
  description: "Whimsy and obscure C++ topics."
  author: "Me"
  defaultTheme: "dark"

  # PaperMod UI feature toggles
  disableSpecial1stPost: true
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true

  # Set default behavior for TOC
  ShowToc: false

  # Assets configuration
  assets:
    disableScrollBarStyle: false
    favicon: "favicon.ico"
    favicon16x16: "favicon-16x16.png"
    favicon32x32: "favicon-32x32.png"
    apple_touch_icon: "apple-touch-icon.png"

  label:
    text: "Whimsy++"
    icon: ""
    iconHeight: 35
