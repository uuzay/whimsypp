baseURL: "/"
languageCode: "en-us"
title: "Whimsy++"
theme: "PaperMod"

outputs:
  home:
    - HTML
    - RSS
    - JSON

menu:
  main:
    - identifier: archive
      name: Archive
      url: /archives/
      weight: 10
    - identifier: search
      name: Search
      url: /search/
      weight: 20
    - identifier: categories
      name: Categories
      url: /categories/
      weight: 30
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 40

pagination:
  pagerSize: 5

enableEmoji: true
enableInlineShortcodes: true

markup:
  highlight:
    noClasses: false
    style: "dracula"
    guessSyntax: true
    lineNos: true
    lineNumbersInTable: true

params:
  env: production
  title: "Whimsy++"
  description: "Bite-sized, whimsy and obscure C++."
  author: "Uzay Uysal"
  defaultTheme: "dark"

  homeInfoParams:
    Title: "Whimsy++"
    Content: |
      Bite-sized, whimsy and obscure C++.

      Each post is categorized in 3 levels for their whimsiness and obscurity for easy navigation.
  socialIcons:
    - name: github
      url: "https://github.com/uuzay"
    - name: linkedin
      url: "https://linkedin.com/in/uzay-uysal"

  # PaperMod UI feature toggles
  disableSpecial1stPost: true
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true

  # Set default behavior for TOC
  ShowToc: false

  # Assets configuration
  assets:
    disableScrollBarStyle: false
    favicon: "favicon.ico"
    favicon16x16: "favicon-16x16.png"
    favicon32x32: "favicon-32x32.png"
    apple_touch_icon: "apple-touch-icon.png"

  label:
    text: "Whimsy++"
    icon: ""
    iconHeight: 35
